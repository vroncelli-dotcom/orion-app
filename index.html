function ChatScreen({ matchId, party, onBack, onSchedule }) {
  const key = `orion_msg_${matchId}`;
  const [messages, setMessages] = useState(()=>{
    const s = LS.get(key,[]);
    if(s.length>0) return s;
    return [{ from:"them", text:`Hi! We would love to connect with you about opportunities here. When is a good time to talk?`, time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) }];
  });
  const [input, setInput] = useState("");
  const bottomRef = useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);
  const send = () => {
    if(!input.trim()) return;
    const msg = { from:"me", text:input.trim(), time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) };
    const u = [...messages, msg];
    setMessages(u); LS.set(key, u); setInput("");
  };
  const name = party?.name || party?.alias || "them";
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:C.off }}>
      <div style={{ background:C.white, padding:"52px 20px 14px", display:"flex", alignItems:"center", gap:14, borderBottom:`1px solid ${C.rule}` }}>
        <BackBtn onClick={onBack}/>
        <div style={{ flex:1 }}>
          <div style={{ ...T.heading, fontSize:16, color:C.ink }}>{name}</div>
          <div style={{ ...T.label, fontSize:9, color:C.green }}>Matched on Orion</div>
        </div>
        <button onClick={()=>onSchedule(party)} style={{ background:"none", border:`1px solid ${C.rule}`, borderRadius:6, padding:"9px 14px", ...T.label, fontSize:11, color:C.ink, cursor:"pointer" }}>Schedule</button>
        <button onClick={onBack} style={{ background:"none", border:`1px solid rgba(10,22,40,.2)`, borderRadius:6, padding:"9px 12px", ...T.label, fontSize:11, color:C.navy, cursor:"pointer" }}>End</button>
      </div>
      <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"20px 16px 8px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.map((msg,i)=>(
          <div key={i} style={{ display:"flex", justifyContent:msg.from==="me"?"flex-end":"flex-start" }}>
            <div style={{ maxWidth:"78%" }}>
              <div style={{ padding:"12px 16px", background:msg.from==="me"?C.navy:C.white, color:msg.from==="me"?C.white:C.ink, borderRadius:msg.from==="me"?"16px 16px 2px 16px":"16px 16px 16px 2px", ...T.body, fontSize:14, lineHeight:1.5, boxShadow:msg.from==="me"?"none":"0 1px 6px rgba(0,0,0,.06)" }}>{msg.text}</div>
              <div style={{ ...T.caption, fontSize:10, color:C.muted, marginTop:4, textAlign:msg.from==="me"?"right":"left" }}>{msg.time}</div>
            </div>
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>
      <div style={{ padding:"12px 16px 32px", background:C.white, borderTop:`1px solid ${C.rule}`, display:"flex", gap:10, alignItems:"flex-end" }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message..."
          style={{ flex:1, padding:"12px 0", background:"transparent", border:"none", borderBottom:`1px solid ${C.rule}`, ...T.body, fontSize:14, color:C.ink, outline:"none" }}/>
        <button onClick={send} style={{ width:42, height:42, borderRadius:"50%", background:input.trim()?C.navy:C.rule, border:"none", color:C.white, fontSize:16, cursor:"pointer", transition:"background .2s" }}>&#8593;</button>
      </div>
    </div>
  );
}

// ── Post Detail ────────────────────────────────────────────────────────────────
function PostDetail({ post, replies, onBack, currentUser, onAddReply }) {
  const [input, setInput] = useState("");
  const [likedR, setLikedR] = useState(()=>LS.get("orion_liked_replies",{}));
  const bottomRef = useRef();
  const toggleRL = id=>{ const u={...likedR,[id]:!likedR[id]}; setLikedR(u); LS.set("orion_liked_replies",u); };
  const submit = ()=>{
    if(!input.trim()) return;
    onAddReply(post.id,{ id:"r-"+Date.now(), author:currentUser?.firstName?`${currentUser.firstName} ${(currentUser.lastName||"")[0]||""}. · ${currentUser?.role||"LO"}`:"Community Member", role:"Mortgage Professional", time:"Just now", text:input.trim(), likes:0 });
    setInput(""); setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };
  const cc=post.cat==="Win"?C.green:post.cat==="Advice"?C.blue:C.muted;
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:C.white }}>
      <div style={{ background:C.white, padding:"52px 24px 14px", display:"flex", alignItems:"center", gap:14, borderBottom:`1px solid ${C.rule}`, flexShrink:0 }}>
        <BackBtn onClick={onBack}/>
        <div style={{ ...T.heading, fontSize:16, color:C.ink, flex:1 }}>Discussion</div>
        <div style={{ ...T.label, fontSize:8, color:cc, background:post.cat==="Win"?C.greenSoft:post.cat==="Advice"?C.blueSoft:C.warm, padding:"3px 9px", borderRadius:20 }}>{post.cat.toUpperCase()}</div>
      </div>
      <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"0 24px" }}>
        <div style={{ padding:"20px 0", borderBottom:`1px solid ${C.rule}` }}>
          <div style={{ ...T.subhead, fontSize:14, color:C.ink }}>{post.author}</div>
          <div style={{ ...T.caption, fontSize:11, color:C.muted, marginBottom:12 }}>{post.role} · {post.time}</div>
          <p style={{ ...T.body, fontSize:15, color:C.body, lineHeight:1.7, marginBottom:14 }}>{post.text}</p>
          <div style={{ display:"flex", gap:16 }}>
            <div style={{ ...T.label, fontSize:9, color:C.muted }}>{post.likes} likes</div>
            <div style={{ ...T.label, fontSize:9, color:C.muted }}>{replies.length} replies</div>
          </div>

function SignInScreen({ onBack, onSignedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const DEMOS = {
    "lo@orion.com":      { id:"demo-lo",  email:"lo@orion.com",      firstName:"Matthew", lastName:"Muskan", accountType:"lo",      verified:true },
    "wcl@orion.com":   { id:"demo-wcl",   email:"wcl@orion.com",   firstName:"West Capital", lastName:"Lending",    accountType:"company", verified:true, companyId:"wcl"   },
    "swift@orion.com": { id:"demo-swift", email:"swift@orion.com", firstName:"Swift",        lastName:"Home Loans", accountType:"company", verified:true, companyId:"swift" },
  };

  const submit = () => {
    if(!email.trim()||!password.trim()){ setError("Please enter your email and password."); return; }
    setLoading(true); setError("");
    setTimeout(()=>{
      const saved = LS.get("orion_user");
      if(saved && saved.email.toLowerCase()===email.toLowerCase()){ setLoading(false); onSignedIn(saved); return; }
      const demo = DEMOS[email.toLowerCase()];
      if(demo && password==="password123"){ LS.set("orion_user",demo); setLoading(false); onSignedIn(demo); }
      else { setLoading(false); setError("No account found. Try a demo account below."); }
    }, 1200);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 160px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:40 }}>
        <BackBtn onClick={onBack}/><Logo size="sm"/>

      <div style={{ display:"flex", flexDirection:"column", gap:22, marginBottom:16 }}>
        <div>
          <Lbl>Email</Lbl>
          <input value={email} onChange={e=>{setEmail(e.target.value);setError("");}} placeholder="you@example.com" type="email"
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${email?C.navy:C.rule}`, ...T.body, fontSize:17, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
        </div>
        <div>
          <Lbl>Password</Lbl>
          <input value={password} onChange={e=>{setPassword(e.target.value);setError("");}} placeholder="..." type="password" onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${password?C.navy:C.rule}`, ...T.body, fontSize:17, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
        </div>
      </div>
      {error&&<div style={{ ...T.body, fontSize:13, color:C.red, padding:"12px 14px", background:"#FFF0F0", borderRadius:6, marginBottom:12 }}>{error}</div>}
      <div style={{ background:C.warm, borderRadius:8, padding:"14px 16px", marginBottom:8, border:`1px solid ${C.rule}` }}>
        <div style={{ ...T.label, fontSize:9, color:C.muted, marginBottom:10 }}>Demo accounts — password: password123</div>
        {[{email:"lo@orion.com",label:"LO Demo (Free)",color:C.navy},{email:"wcl@orion.com",label:"West Capital (Paid)",color:C.gold},{email:"swift@orion.com",label:"Swift Home Loans (Free Trial)",color:"#1C2E42"}].map(d=>(
          <button key={d.email} onClick={()=>{setEmail(d.email);setPassword("password123");setError("");}}
            style={{ display:"flex", gap:10, alignItems:"center", background:"none", border:"none", cursor:"pointer", padding:"5px 0", width:"100%" }}>
            <div style={{ ...T.label, fontSize:8, color:C.white, background:d.color, padding:"2px 8px", borderRadius:20, flexShrink:0 }}>{d.label}</div>
          </button>
        ))}
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        {loading?<div style={{ textAlign:"center", padding:"12px 0" }}><div style={{ display:"flex", justifyContent:"center", gap:8 }}>{[0,1,2].map(i=><div key={i} style={{ width:9,height:9,borderRadius:"50%",background:C.navy,opacity:0.2+i*0.4 }}/>)}</div></div>

    </div>
  );

  const EditBtn=({section})=>(<button onClick={()=>openEdit(section)} style={{ ...T.label,fontSize:9,color:C.navy,background:C.navyLight,border:"1px solid rgba(10,22,40,.12)",borderRadius:20,padding:"4px 12px",cursor:"pointer" }}>Edit</button>);

  return (
    <div style={{ minHeight:"100vh",background:C.off,paddingBottom:100 }}>

            <div style={{ ...T.label,fontSize:9,color:C.gold }}>NMLS #{profile.nmls} &#8212; Verified</div>
          </div>
        </div>
        <div style={{ background:"rgba(255,255,255,.1)",borderRadius:6,padding:"10px 14px" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6 }}>
            <div style={{ ...T.label,fontSize:9,color:"rgba(255,255,255,.5)" }}>Profile completeness</div>
            <div style={{ ...T.subhead,fontSize:13,color:pct>=80?C.gold:"rgba(255,255,255,.7)" }}>{pct}%</div>
          </div>
          <div style={{ background:"rgba(255,255,255,.12)",borderRadius:20,height:4 }}>
            <div style={{ background:pct>=80?C.gold:"rgba(255,255,255,.55)",borderRadius:20,height:"100%",width:`${pct}%`,transition:"width .4s" }}/>

      <div style={{ background:C.white,marginBottom:1 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px 10px" }}><div style={{ ...T.label,fontSize:9,color:C.muted }}>PRODUCTION DATA</div><Lock/></div>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:C.rule }}>
          {[{l:"Volume",v:profile.volume},{l:"Units",v:profile.units},{l:"Avg Loan",v:profile.avgLoan}].map(s=>(<div key={s.l} style={{ padding:"14px 16px",background:C.white }}><div style={{ ...T.display,fontSize:20,color:C.navy,lineHeight:1,marginBottom:2 }}>{s.v}</div><div style={{ ...T.label,fontSize:8,color:C.muted }}>{s.l.toUpperCase()}</div></div>))}
        </div>
        <div style={{ padding:"12px 20px 16px" }}>
          <div style={{ ...T.label,fontSize:8,color:C.muted,marginBottom:6 }}>LICENSED STATES</div>
          <div style={{ display:"flex",flexWrap:"wrap",gap:4 }}>{profile.states.map(s=><div key={s} style={{ background:C.navyLight,border:"1px solid rgba(10,22,40,.1)",borderRadius:4,padding:"3px 7px",...T.label,fontSize:7,color:C.navy }}>{s}</div>)}</div>

      </div>
      <div style={{ background:C.white,padding:"18px 20px",borderBottom:`1px solid ${C.rule}` }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}><div style={{ ...T.label,fontSize:9,color:C.muted }}>BIO</div><EditBtn section="bio"/></div>
        {ep.bio?<p style={{ ...T.body,fontSize:13,color:C.body,lineHeight:1.65 }}>{ep.bio}</p>:<p style={{ ...T.body,fontSize:13,color:C.ghost,fontStyle:"italic" }}>Add a bio so companies know who you are...</p>}

        {ep.compTypes.length?<div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>{ep.compTypes.map(c=><div key={c} style={{ background:C.navyLight,border:"1px solid rgba(10,22,40,.1)",borderRadius:20,padding:"5px 12px",...T.label,fontSize:9,color:C.navy }}>{c}</div>)}</div>:<p style={{ ...T.body,fontSize:13,color:C.ghost,fontStyle:"italic" }}>Add your comp preferences...</p>}
      </div>
      <div style={{ background:C.white,padding:"18px 20px",borderBottom:`1px solid ${C.rule}` }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}><div style={{ ...T.label,fontSize:9,color:C.muted }}>WORK STYLE</div><EditBtn section="style"/></div>

        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}><div style={{ ...T.label,fontSize:9,color:C.muted }}>LOAN TYPES</div><EditBtn section="loans"/></div>
        {ep.loanTypes.length?<div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>{ep.loanTypes.map(l=><div key={l} style={{ border:`1px solid ${C.rule}`,padding:"5px 12px",borderRadius:20,...T.label,fontSize:9,color:C.body }}>{l}</div>)}</div>:<p style={{ ...T.body,fontSize:13,color:C.ghost,fontStyle:"italic" }}>Select loan types you specialize in...</p>}
      </div>
      <div style={{ background:C.white,padding:"18px 20px",borderBottom:`1px solid ${C.rule}` }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}><div style={{ ...T.label,fontSize:9,color:C.muted }}>CLIENT REVIEWS</div><Lock/></div>
        <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:8 }}><span style={{ color:"#F59E0B",fontSize:14 }}>&#9733;&#9733;&#9733;&#9733;&#9733;</span><span style={{ ...T.subhead,fontSize:14,color:C.ink }}>{profile.googleRating}</span><span style={{ ...T.caption,fontSize:12,color:C.muted }}>({profile.googleCount} reviews)</span></div>
        <div style={{ paddingLeft:12,borderLeft:`3px solid ${C.navy}` }}><p style={{ ...T.body,fontSize:13,color:C.body,fontStyle:"italic" }}>&#8220;{profile.review}&#8221;</p></div>
      </div>
      <div style={{ background:C.white,padding:"18px 20px",borderBottom:`1px solid ${C.rule}` }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}><div style={{ ...T.label,fontSize:9,color:C.muted }}>SOCIAL &amp; REVIEWS</div><EditBtn section="social"/></div>
        <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
          {[{label:"LinkedIn",url:ep.linkedinUrl,c:C.blue,bg:C.blueSoft},{label:"Google Reviews",url:ep.googleUrl,c:"#34A853",bg:"rgba(52,168,83,.08)"},{label:"Experience.com",url:ep.experienceUrl,c:C.navy,bg:C.navyLight}].map(s=>(
            s.url?<a key={s.label} href={s.url} target="_blank" rel="noreferrer" style={{ display:"inline-flex",alignItems:"center",gap:8,background:s.bg,border:`1px solid ${s.c}22`,borderRadius:6,padding:"9px 14px",textDecoration:"none" }}><span style={{ ...T.label,fontSize:9,color:s.c }}>{s.label}</span></a>
            :<div key={s.label} style={{ display:"inline-flex",alignItems:"center",gap:8,background:C.warm,border:`1px solid ${C.rule}`,borderRadius:6,padding:"9px 14px",opacity:.5 }}><span style={{ ...T.label,fontSize:9,color:C.muted }}>Add {s.label}</span></div>
          ))}
        </div>
      </div>
      <div style={{ background:C.white,padding:"18px 20px",marginBottom:1 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
          <div><div style={{ ...T.label,fontSize:9,color:C.muted,marginBottom:4 }}>ANONYMOUS MODE</div><div style={{ ...T.body,fontSize:13,color:C.body }}>Hide your name until you match</div></div>
          <button onClick={()=>setEP(p=>({...p,anonMode:!p.anonMode}))} style={{ width:48,height:28,borderRadius:20,background:ep.anonMode?C.navy:C.rule,border:"none",cursor:"pointer",position:"relative",transition:"background .25s" }}>
            <div style={{ width:20,height:20,borderRadius:"50%",background:C.white,position:"absolute",top:4,left:ep.anonMode?24:4,transition:"left .25s" }}/>
          </button>
        </div>
      </div>
      <div style={{ padding:"20px 20px 40px" }}><button onClick={onSignOut} style={{ background:"none",border:`1px solid ${C.rule}`,borderRadius:6,padding:"12px",width:"100%",cursor:"pointer",...T.label,fontSize:10,color:C.muted }}>Sign out</button></div>
      {editing&&(
        <div style={{ position:"fixed",inset:0,background:"rgba(10,22,40,.8)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:400 }}>
          <div style={{ background:C.white,borderRadius:"14px 14px 0 0",padding:"28px 20px 56px",width:"100%",maxWidth:420,maxHeight:"88vh",overflowY:"auto" }}>
            {editing==="bio"&&<><div style={{ ...T.display,fontSize:24,color:C.ink,marginBottom:6 }}>Your bio</div><p style={{ ...T.body,fontSize:13,color:C.muted,marginBottom:16,lineHeight:1.6 }}>Be genuine &#8212; what do you actually do well?</p><textarea value={draft.bio||""} onChange={e=>setDraft(p=>({...p,bio:e.target.value}))} rows={5} placeholder="Branch Manager with 15+ years..." style={{ width:"100%",border:`1.5px solid ${C.navy}`,borderRadius:8,padding:"12px 14px",...T.body,fontSize:14,color:C.ink,lineHeight:1.6,resize:"none",outline:"none",boxSizing:"border-box" }}/><div style={{ ...T.caption,fontSize:11,color:C.muted,textAlign:"right",marginTop:4 }}>{(draft.bio||"").length} chars</div></>}
            {editing==="comp"&&<><div style={{ ...T.display,fontSize:24,color:C.ink,marginBottom:6 }}>Compensation</div><div style={{ display:"flex",flexDirection:"column",gap:8,marginTop:16 }}>{COMP_OPTS.map(c=>{const on=(draft.compTypes||[]).includes(c); return <button key={c} onClick={()=>toggleArr("compTypes",c)} style={{ padding:"13px 16px",borderRadius:8,border:`1.5px solid ${on?C.navy:C.rule}`,background:on?C.navyLight:"transparent",...T.body,fontSize:14,color:on?C.navy:C.ink,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center" }}>{c}{on&&<span style={{ color:C.navy }}>&#10003;</span>}</button>;})}</div></>}
            {editing==="style"&&<><div style={{ ...T.display,fontSize:24,color:C.ink,marginBottom:6 }}>Work style</div><div style={{ display:"flex",flexDirection:"column",gap:8,marginTop:16 }}>{STYLE_OPTS.map(s=>{const on=draft.style===s; return <button key={s} onClick={()=>setDraft(p=>({...p,style:s}))} style={{ padding:"13px 16px",borderRadius:8,border:`1.5px solid ${on?C.navy:C.rule}`,background:on?C.navy:"transparent",...T.label,fontSize:12,color:on?C.white:C.ink,cursor:"pointer" }}>{s}</button>;})}</div></>}
            {editing==="loans"&&<><div style={{ ...T.display,fontSize:24,color:C.ink,marginBottom:6 }}>Loan types</div><div style={{ display:"flex",flexWrap:"wrap",gap:8,marginTop:16 }}>{WORK_TYPES.map(w=>{const on=(draft.loanTypes||[]).includes(w); return <button key={w} onClick={()=>toggleArr("loanTypes",w)} style={{ padding:"9px 14px",borderRadius:20,border:`1.5px solid ${on?C.navy:C.rule}`,background:on?C.navy:"transparent",...T.label,fontSize:10,color:on?C.white:C.muted,cursor:"pointer" }}>{w}</button>;})}</div></>}
            {editing==="social"&&<><div style={{ ...T.display,fontSize:24,color:C.ink,marginBottom:6 }}>Social &amp; reviews</div><p style={{ ...T.body,fontSize:13,color:C.muted,marginBottom:20,lineHeight:1.6 }}>Optional. Companies love seeing real reviews.</p>{[{key:"linkedinUrl",label:"LinkedIn URL",ph:"linkedin.com/in/yourname"},{key:"googleUrl",label:"Google Reviews URL",ph:"g.page/yourname/review"},{key:"experienceUrl",label:"Experience.com URL",ph:"experience.com/your-profile"}].map(f=>(<div key={f.key} style={{ marginBottom:20 }}><div style={{ ...T.label,fontSize:9,color:C.muted,marginBottom:6 }}>{f.label.toUpperCase()}</div><input value={draft[f.key]||""} onChange={e=>setDraft(p=>({...p,[f.key]:e.target.value}))} placeholder={f.ph} style={{ width:"100%",border:"none",outline:"none",borderBottom:`2px solid ${draft[f.key]?C.navy:C.rule}`,...T.body,fontSize:14,color:C.ink,padding:"8px 0",boxSizing:"border-box" }}/></div>))}</>}
            <div style={{ display:"flex",gap:10,marginTop:24 }}>
              <button onClick={()=>setEditing(null)} style={{ flex:"0 0 80px",padding:"12px",borderRadius:6,border:`1px solid ${C.rule}`,background:"none",cursor:"pointer",...T.label,fontSize:10,color:C.muted }}>Cancel</button>
              <button onClick={saveEdit} style={{ flex:1,padding:"12px",borderRadius:6,border:"none",background:C.navy,cursor:"pointer",...T.label,fontSize:12,color:C.white }}>Save changes</button>
            </div>
          </div>
        </div>
      )}
      <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
    </div>
  );
}

// ── LO App ────────────────────────────────────────────────────────────────────
function LOApp({ user, onSignOut }) {
  const [tab, setTab] = useState("discover");
  const [profile] = useState(()=>({ ...MATTHEW_PROFILE }));
  const [cardIdx, setCardIdx] = useState(0);
  const [filter, setFilter] = useState("All");
  const [matches, setMatches] = useState(()=>LS.get("orion_lo_matches",[]));
  const [showMatch, setShowMatch] = useState(null);
  const [chatParty, setChatParty] = useState(null);
  const [chatMid, setChatMid] = useState(null);
  const [schedParty, setSchedParty] = useState(null);
  const [showSched, setShowSched] = useState(false);
  const [showPaywall, setShowPaywall] = useState(false);
  const [paywallType, setPaywallType] = useState("connect");
  const paid = true; // LOs are always free — no paywalls for job seekers
  const [interviews, setInterviews] = useState(()=>LS.get("orion_interviews",[]));
  const [openPost, setOpenPost] = useState(null);
  const [posts, setPosts] = useState(()=>LS.get("orion_posts")||SEED_POSTS.map(p=>({...p})));
  const [replies, setReplies] = useState(()=>LS.get("orion_replies",SEED_REPLIES));
  const [likedP, setLikedP] = useState(()=>LS.get("orion_liked_posts",{}));
  const [newsTab, setNewsTab] = useState("feed");
  const [catFilter, setCatFilter] = useState("All");
  const [compose, setCompose] = useState(false);
  const [newPost, setNewPost] = useState("");

  const FILTERS=[
    {label:"All",fn:()=>true},{label:"Premium",fn:c=>c.tier==="premium"},
    {label:"Remote",fn:c=>c.remote==="Remote"},{label:"Hybrid",fn:c=>c.remote==="Hybrid"},
    {label:"LOs",fn:c=>(c.hiring||[]).includes("Loan Officers")},
    {label:"Mgmt",fn:c=>(c.hiring||[]).includes("Branch Managers")},
  ];
  const filtered = COMPANIES.filter(FILTERS.find(f=>f.label===filter)?.fn||(()=>true));
  const deck = filtered.slice(cardIdx);
  const co = deck[0];

  const swipe = (dir, co) => {
    if(!co) return;
    if(dir==="right"){
      const m = { id:co.id, name:co.name, tier:co.tier, matchedAt:Date.now(), status:"active", mid:`match-${co.id}` };
      const nm = [...matches, m]; setMatches(nm); LS.set("orion_lo_matches", nm); setShowMatch(co);
    }
    setCardIdx(i=>i+1);
  };

  const upgrade = () => setShowPaywall(false); // LOs are always free — viewer sheet dismiss only
  const toggleLike = id => { const u={...likedP,[id]:!likedP[id]}; setLikedP(u); LS.set("orion_liked_posts",u); };
  const addPost = () => {
    if(!newPost.trim()) return;
    const p = { id:"p-"+Date.now(), author:`${profile.firstName} ${profile.lastName[0]}. · Irvine CA`, role:`${profile.role}, ${profile.experience} yrs`, time:"Just now", cat:"Career", text:newPost.trim(), likes:0, replies:0 };
    const u = [p,...posts]; setPosts(u); LS.set("orion_posts",u); setNewPost(""); setCompose(false);
  };
  const addReply = (pid, reply) => { const u={...replies,[pid]:[...(replies[pid]||[]),reply]}; setReplies(u); LS.set("orion_replies",u); };

  if(chatParty) return <ChatScreen matchId={chatMid||"lom"} party={chatParty} onBack={()=>setChatParty(null)} onSchedule={p=>{setChatParty(null);setSchedParty(p);setShowSched(true);}}/>;
  if(openPost) return <PostDetail post={openPost} replies={replies[openPost.id]||[]} onBack={()=>setOpenPost(null)} currentUser={profile} onAddReply={addReply}/>;

  const activeMatches = matches.filter(m=>m.status!=="disconnected");
  const TABS=[
    {id:"discover",label:"Discover"},
    {id:"matches",label:activeMatches.length?`Matches ${activeMatches.length}`:"Matches"},
    {id:"community",label:"Community"},
    {id:"learn",label:"Learn"},
    {id:"profile",label:"Profile"},
  ];

  return (
    <div style={{ paddingBottom:tab==="discover"?0:80, minHeight:"100vh", background:C.off, maxWidth:420, margin:"0 auto" }}>

      {/* DISCOVER */}
      {tab==="discover"&&(
        <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>
          <div style={{ background:C.white, padding:"52px 22px 12px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.rule}` }}>
            <Logo size="sm"/>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <button onClick={()=>{setShowPaywall(true);setPaywallType("free");}} style={{ display:"flex",alignItems:"center",gap:5,...T.label, fontSize:8, color:C.navy, background:C.navyLight, border:"1px solid rgba(10,22,40,.15)", borderRadius:20, padding:"5px 12px", cursor:"pointer" }}>
                <div style={{ width:6,height:6,borderRadius:"50%",background:C.navy,opacity:.5 }}/>
                {ANON_VIEWERS.length} viewed you
              </button>
            </div>
          </div>
          {/* Filter bar */}
          <div style={{ position:"relative", flexShrink:0 }}>
            <div style={{ background:C.white, borderBottom:`1px solid ${C.rule}`, padding:"10px 0 10px 16px", display:"flex", gap:8, overflowX:"auto", scrollbarWidth:"none", msOverflowStyle:"none", WebkitOverflowScrolling:"touch" }}>
              {FILTERS.map(f=>(
                <button key={f.label} onClick={()=>{setFilter(f.label);setCardIdx(0);}} style={{ padding:"7px 16px", borderRadius:20, flexShrink:0, cursor:"pointer", whiteSpace:"nowrap", border:`1px solid ${filter===f.label?C.navy:C.rule}`, background:filter===f.label?C.navy:"transparent", ...T.label, fontSize:11, color:filter===f.label?C.white:C.muted }}>
                  {f.label}
                </button>
              ))}
              <div style={{ width:32, flexShrink:0 }}/>
            </div>
            <div style={{ position:"absolute", right:0, top:0, bottom:1, width:48, background:"linear-gradient(to left, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%)", pointerEvents:"none" }}/>
          </div>
          {deck.length===0?(
            <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:40, textAlign:"center" }}>
              <div style={{ ...T.display, fontSize:28, color:C.ink, lineHeight:1, marginBottom:10 }}>You've seen<br/>everyone.</div>
              <p style={{ ...T.body, fontSize:14, color:C.muted, marginBottom:24 }}>New companies join Orion every week.</p>
              <Btn v="soft" onClick={()=>setTab("matches")} s={{ maxWidth:220 }}>See my matches {activeMatches.length}</Btn>
            </div>
          ):(
            <>
              <div style={{ flex:1, position:"relative", padding:"10px 16px 8px", minHeight:0 }}>
                {deck.length>1&&<div style={{ position:"absolute", inset:"18px 26px 0", background:C.white, borderRadius:10, border:`1px solid ${C.rule}`, transform:"scale(.97) translateY(6px)", zIndex:1 }}/>}
                {deck.slice(0,2).reverse().map((c,i)=>(
                  <CompanyCard key={c.id+"-"+i} co={c} isTop={i===Math.min(deck.length,2)-1} isPremium={c.tier==="premium"} onSwipe={swipe}/>
                ))}
              </div>
              <div style={{ background:C.white, borderTop:`1px solid ${C.rule}`, padding:"14px 0 88px", display:"flex", justifyContent:"center", alignItems:"center", gap:20, flexShrink:0 }}>
                <button onClick={()=>swipe("left",deck[0])} style={{ width:54, height:54, borderRadius:"50%", background:C.white, border:`1px solid ${C.rule}`, fontSize:22, color:C.ghost, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>&#10007;</button>
                <button onClick={()=>swipe("right",deck[0])} style={{ width:70, height:70, borderRadius:"50%", background:deck[0]?.tier==="premium"?C.gold:C.navy, border:"none", fontSize:26, color:C.white, cursor:"pointer", boxShadow:`0 6px 24px ${deck[0]?.tier==="premium"?"rgba(196,148,42,.45)":"rgba(10,22,40,.3)"}`, display:"flex", alignItems:"center", justifyContent:"center" }}>&#9825;</button>
                <button style={{ width:54, height:54, borderRadius:"50%", background:C.white, border:`1px solid ${C.rule}`, fontSize:22, color:C.ghost, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>&#9733;</button>
              </div>
            </>
          )}
          {showMatch&&<MatchModal party={showMatch} isPremium={showMatch.tier==="premium"} onChat={c=>{setShowMatch(null);setChatMid(c.mid||"m-"+c.id);setChatParty(c);}} onSchedule={c=>{setShowMatch(null);setSchedParty(c);setShowSched(true);}} onClose={()=>setShowMatch(null)}/>}

            {editing==="hiring"&&<>

              <div style={{ display:"flex",flexDirection:"column",gap:8 }}>

                );})}

            {editing==="social"&&<>
              <div style={{ ...T.display,fontSize:24,color:C.ink,marginBottom:6 }}>Website &amp; social</div>

                <div key={f.key} style={{ marginBottom:20 }}>
                  <div style={{ ...T.label,fontSize:9,color:C.muted,marginBottom:6 }}>{f.label.toUpperCase()}</div>
                  <input value={draft[f.key]||""} onChange={e=>setDraft(p=>({...p,[f.key]:e.target.value}))} placeholder={f.ph}
                    style={{ width:"100%",border:"none",outline:"none",borderBottom:`2px solid ${draft[f.key]?C.navy:C.rule}`,...T.body,fontSize:14,color:C.ink,padding:"8px 0",boxSizing:"border-box" }}/>

            <div style={{ display:"flex",gap:10,marginTop:24 }}>
              <button onClick={()=>setEditing(null)} style={{ flex:"0 0 80px",padding:"12px",borderRadius:6,border:`1px solid ${C.rule}`,background:"none",cursor:"pointer",...T.label,fontSize:10,color:C.muted }}>Cancel</button>
              <button onClick={saveEdit} style={{ flex:1,padding:"12px",borderRadius:6,border:"none",background:C.navy,cursor:"pointer",...T.label,fontSize:12,color:C.white }}>Save changes</button>
            </div>
          </div>
        </div>
      )}

      <BottomNav tabs={TABS} active={tab} onTab={setTab}/>

}

// ── Company App (West Capital Lending login) ──────────────────────────────────
function CompanyApp({ user, onSignOut }) {
  const [tab, setTab] = useState("browse");
  const [candIdx, setCandIdx] = useState(0);
  const [pipeline, setPipeline] = useState(()=>LS.get("orion_co_pipeline",[
    { ...SEEKERS[0], status:"interested", mid:"m1" },
    { ...SEEKERS[1], status:"interview",  mid:"m2" },
  ]));
  const [showMatch, setShowMatch] = useState(null);
  const [chatParty, setChatParty] = useState(null);
  const [chatMid, setChatMid] = useState(null);
  const [schedParty, setSchedParty] = useState(null);
  const [showSched, setShowSched] = useState(false);
  const [interviews, setInterviews] = useState(()=>LS.get("orion_co_interviews",[]));
  const [openPost, setOpenPost] = useState(null);
  const [posts, setPosts] = useState(()=>LS.get("orion_posts")||SEED_POSTS.map(p=>({...p})));
  const [replies, setReplies] = useState(()=>LS.get("orion_replies",SEED_REPLIES));
  const [likedP, setLikedP] = useState(()=>LS.get("orion_liked_posts",{}));
  const [newsTab, setNewsTab] = useState("feed");
  const [catFilter, setCatFilter] = useState("All");
  const [compose, setCompose] = useState(false);
  const [newPost, setNewPost] = useState("");
  const [paid, setPaid] = useState(()=>user.paid || LS.get("orion_paid",false));
  const [showPaywall, setShowPaywall] = useState(false);
  const [paywallType, setPaywallType] = useState("connect");
  const upgradeCompany = () => { setPaid(true); LS.set("orion_paid",true); setShowPaywall(false); };

  const deck = SEEKERS.slice(candIdx);
  const swipe = (dir, seeker) => {
    if(dir==="right"){
      if(!paid){ setPaywallType("connect"); setShowPaywall(true); setCandIdx(i=>i+1); return; }
      const m = { ...seeker, status:"new", mid:`m-${Date.now()}` };

    }
    setCandIdx(i=>i+1);
  };
  const toggleLike = id => { const u={...likedP,[id]:!likedP[id]}; setLikedP(u); LS.set("orion_liked_posts",u); };
  const addPost = () => {
    if(!newPost.trim()) return;
    const p = { id:"p-"+Date.now(), author:"West Capital Lending · Hiring Team", role:"Hiring Manager", time:"Just now", cat:"Career", text:newPost.trim(), likes:0, replies:0 };
    const u = [p,...posts]; setPosts(u); LS.set("orion_posts",u); setNewPost(""); setCompose(false);
  };
  const addReply = (pid, reply) => { const u={...replies,[pid]:[...(replies[pid]||[]),reply]}; setReplies(u); LS.set("orion_replies",u); };

  if(chatParty) return <ChatScreen matchId={chatMid||"com"} party={chatParty} onBack={()=>setChatParty(null)} onSchedule={p=>{setChatParty(null);setSchedParty(p);setShowSched(true);}}/>;
  if(openPost) return <PostDetail post={openPost} replies={replies[openPost.id]||[]} onBack={()=>setOpenPost(null)} currentUser={{firstName:"West Capital",role:"Hiring Manager"}} onAddReply={addReply}/>;

  const STATUS = { new:{label:"New",color:C.navy,bg:C.navyLight}, interested:{label:"Interested",color:C.blue,bg:C.blueSoft}, interview:{label:"Interview",color:C.green,bg:C.greenSoft} };
  const TABS=[{id:"browse",label:"Browse"},{id:"pipeline",label:"Pipeline"},{id:"community",label:"Community"},{id:"profile",label:"Company"}];
  const WCL = COMPANIES[0]; // West Capital data

  return (
    <div style={{ paddingBottom:tab==="browse"?0:80, minHeight:"100vh", background:C.off, maxWidth:420, margin:"0 auto" }}>

      {/* BROWSE */}
      {tab==="browse"&&(
        <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>
          <div style={{ background:C.white, padding:"52px 22px 12px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.rule}` }}>
            <Logo size="sm"/>
            {paid
              ? <div style={{ display:"inline-flex", alignItems:"center", gap:5, background:C.goldSoft, border:`1px solid ${C.goldRule}`, borderRadius:20, padding:"4px 11px" }}><div style={{ width:6, height:6, borderRadius:"50%", background:C.gold }}/><div style={{ ...T.label, fontSize:8, color:C.gold }}>Premium Partner</div></div>
              : <div style={{ display:"inline-flex", alignItems:"center", gap:5, background:C.warm, border:`1px solid ${C.rule}`, borderRadius:20, padding:"4px 11px", cursor:"pointer" }} onClick={()=>{setPaywallType("connect");setShowPaywall(true);}}><div style={{ width:6, height:6, borderRadius:"50%", background:C.muted }}/><div style={{ ...T.label, fontSize:8, color:C.muted }}>Free Trial &#8212; Upgrade</div></div>}
          </div>
          {deck.length===0?(
            <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:40, textAlign:"center" }}>
              <div style={{ ...T.display, fontSize:28, color:C.ink, lineHeight:1, marginBottom:10 }}>You've seen<br/>everyone.</div>
              <Btn v="soft" onClick={()=>setTab("pipeline")} s={{ maxWidth:220, marginTop:16 }}>See pipeline</Btn>
            </div>
          ):(
            <>
              <div style={{ flex:1, position:"relative", padding:"10px 16px 8px", minHeight:0 }}>
                {deck.length>1&&<div style={{ position:"absolute", inset:"18px 26px 0", background:C.white, borderRadius:10, border:`1px solid ${C.rule}`, transform:"scale(.97) translateY(6px)", zIndex:1 }}/>}
                {deck.slice(0,2).reverse().map((s,i)=>(
                  <SeekerCard key={s.id+"-"+i} seeker={s} isTop={i===Math.min(deck.length,2)-1} onSwipe={swipe} paid={paid}/>
                ))}
              </div>
              <div style={{ background:C.white, borderTop:`1px solid ${C.rule}`, padding:"14px 0 88px", display:"flex", justifyContent:"center", gap:20, flexShrink:0 }}>
                <button onClick={()=>swipe("left",deck[0])} style={{ width:54, height:54, borderRadius:"50%", background:C.white, border:`1px solid ${C.rule}`, fontSize:22, color:C.ghost, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>&#10007;</button>

              </div>

          {showPaywall&&<PaywallModal onClose={()=>setShowPaywall(false)} onUpgrade={upgradeCompany} type={paywallType} viewerCount={5}/>}
          {showSched&&schedParty&&<ScheduleModal party={schedParty} onClose={()=>{setShowSched(false);setSchedParty(null);}} onConfirm={iv=>{const ni=[{id:"iv-"+Date.now(),...iv},...interviews];setInterviews(ni);LS.set("orion_co_interviews",ni);}}/>}

                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <div><div style={{ ...T.subhead, fontSize:13, color:C.ink }}>{post.author}</div><div style={{ ...T.caption, fontSize:11, color:C.muted }}>{post.role} · {post.time}</div></div>
                  <div style={{ ...T.label, fontSize:8, color:post.cat==="Win"?C.green:post.cat==="Advice"?C.blue:C.muted, background:post.cat==="Win"?C.greenSoft:post.cat==="Advice"?C.blueSoft:C.warm, padding:"3px 9px", borderRadius:20, flexShrink:0, marginLeft:8 }}>{post.cat.toUpperCase()}</div>
                </div>
                <p onClick={()=>setOpenPost(post)} style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.65, marginBottom:12, cursor:"pointer" }}>{post.text}</p>
                <div style={{ display:"flex", gap:20 }}>
                  <button onClick={()=>toggleLike(post.id)} style={{ background:"none", border:"none", display:"flex", alignItems:"center", gap:6, padding:0, cursor:"pointer" }}>
                    <span style={{ fontSize:15, color:likedP[post.id]?C.navy:C.ghost }}>{likedP[post.id]?"♥":"♡"}</span>
                    <span style={{ ...T.label, fontSize:9, color:likedP[post.id]?C.navy:C.muted }}>{post.likes+(likedP[post.id]?1:0)}</span>
                  </button>
                  <button onClick={()=>setOpenPost(post)} style={{ background:"none", border:"none", ...T.label, fontSize:9, color:C.navy, cursor:"pointer" }}>{(replies[post.id]||[]).length||post.replies} replies — View</button>
                </div>
              </div>
            ))}
          </>}
          {newsTab==="news"&&NEWS.map(a=>(
            <a key={a.headline} href={a.url||"#"} target="_blank" rel="noreferrer" style={{ display:"block", padding:"20px 24px", borderBottom:`1px solid ${C.rule}`, textDecoration:"none" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <div style={{ ...T.label, fontSize:8, color:C.navy }}>{a.source.toUpperCase()}</div>
                <div style={{ ...T.label, fontSize:8, color:C.muted, background:C.warm, padding:"3px 9px", borderRadius:20 }}>{a.cat.toUpperCase()}</div>
              </div>
              <div style={{ ...T.heading, fontSize:15, color:C.ink, lineHeight:1.3, marginBottom:10 }}>{a.headline}</div>
              <div style={{ ...T.label, fontSize:9, color:C.navy }}>Read article &#8594;</div>
            </a>
          ))}
          {compose&&(
            <div style={{ position:"fixed", inset:0, background:"rgba(10,22,40,.72)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:200 }}>
              <div style={{ background:C.white, borderRadius:"14px 14px 0 0", padding:"28px 24px 0", width:"100%", maxWidth:420, maxHeight:"85vh", overflowY:"auto", display:"flex", flexDirection:"column" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
                  <div style={{ ...T.heading, fontSize:18, color:C.ink }}>Share with the community</div>
                  <button onClick={()=>setCompose(false)} style={{ background:"none", border:"none", color:C.muted, fontSize:24, cursor:"pointer" }}>x</button>
                </div>
                <textarea value={newPost} onInput={e=>setNewPost(e.target.value)} placeholder="Share a win, ask a question, post a role..." rows={5}
                  style={{ width:"100%", background:"transparent", border:"none", borderBottom:`1px solid ${C.rule}`, ...T.body, fontSize:14, color:C.ink, outline:"none", resize:"none", lineHeight:1.65, boxSizing:"border-box", marginBottom:8, padding:0 }}/>
                <div style={{ ...T.caption, fontSize:11, color:newPost.length>500?C.red:C.ghost, textAlign:"right", marginBottom:16 }}>{newPost.length} / 500</div>
                <Btn v="navy" onClick={addPost} disabled={!newPost.trim()||newPost.length>500}>Post to Community</Btn>
                <div style={{ height:32 }}/>
              </div>
            </div>
          )}
          <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
        </div>
      )}

      {/* COMPANY PROFILE */}
      {tab==="profile"&&<CompanyProfileTab WCL={WCL} onSignOut={onSignOut} TABS={TABS} tab={tab} setTab={setTab}/>}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(()=>{
    const u = LS.get("orion_user");
    return u ? "app" : "home";
  });
  const [user, setUser] = useState(()=>LS.get("orion_user"));

  const signOut = () => { LS.del("orion_user"); setUser(null); setScreen("home"); };
  const afterSignIn = u => { setUser(u); setScreen("app"); };

  if(screen==="app"&&user){
    if(user.accountType==="company") return <CompanyApp user={user} onSignOut={signOut}/>;
    return <LOApp user={user} onSignOut={signOut}/>;
  }

  return (
    <div style={{ maxWidth:420, margin:"0 auto", minHeight:"100vh", background:C.white }}>
      {screen==="home"&&<HomeScreen onLO={()=>setScreen("onboard-lo")} onCompany={()=>setScreen("onboard-co")} onSignIn={()=>setScreen("signin")}/>}
      {screen==="onboard-lo"&&<LOOnboarding onComplete={u=>{LS.set("orion_user",u);setUser(u);setScreen("app");}}/>}
      {screen==="onboard-co"&&<CompanyOnboarding onComplete={u=>{LS.set("orion_user",u);setUser(u);setScreen("app");}}/>}
      {screen==="signin"&&<SignInScreen onBack={()=>setScreen("home")} onSignedIn={afterSignIn}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
