// ── Chat Screen ────────────────────────────────────────────────────────────────
function ChatScreen({ matchId, party, onBack, onSchedule }) {
  const key = `orion_msg_${matchId}`;
  const [messages, setMessages] = useState(()=>{
    const s = LS.get(key,[]);
    if(s.length>0) return s;
    return [{ from:"them", text:`Hi! We would love to connect with you about opportunities here. When is a good time to talk?`, time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) }];
  });
  const [input, setInput] = useState("");
  const bottomRef = useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);
  const send = () => {
    if(!input.trim()) return;
    const msg = { from:"me", text:input.trim(), time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) };
    const u = [...messages, msg];
    setMessages(u); LS.set(key, u); setInput("");
  };
  const name = party?.name || party?.alias || "them";
  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:C.off }}>
      <div style={{ background:C.white, padding:"52px 20px 14px", display:"flex", alignItems:"center", gap:14, borderBottom:`1px solid ${C.rule}` }}>
        <BackBtn onClick={onBack}/>
        <div style={{ flex:1 }}>
          <div style={{ ...T.heading, fontSize:16, color:C.ink }}>{name}</div>
          <div style={{ ...T.label, fontSize:9, color:C.green }}>Matched on Orion</div>
        </div>
        <button onClick={()=>onSchedule(party)} style={{ background:"none", border:`1px solid ${C.rule}`, borderRadius:6, padding:"9px 14px", ...T.label, fontSize:11, color:C.ink, cursor:"pointer" }}>Schedule</button>
        <button onClick={onBack} style={{ background:"none", border:`1px solid rgba(10,22,40,.2)`, borderRadius:6, padding:"9px 12px", ...T.label, fontSize:11, color:C.navy, cursor:"pointer" }}>End</button>
      </div>
      <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"20px 16px 8px", display:"flex", flexDirection:"column", gap:12 }}>
        {messages.map((msg,i)=>(
          <div key={i} style={{ display:"flex", justifyContent:msg.from==="me"?"flex-end":"flex-start" }}>
            <div style={{ maxWidth:"78%" }}>
              <div style={{ padding:"12px 16px", background:msg.from==="me"?C.navy:C.white, color:msg.from==="me"?C.white:C.ink, borderRadius:msg.from==="me"?"16px 16px 2px 16px":"16px 16px 16px 2px", ...T.body, fontSize:14, lineHeight:1.5, boxShadow:msg.from==="me"?"none":"0 1px 6px rgba(0,0,0,.06)" }}>{msg.text}</div>
              <div style={{ ...T.caption, fontSize:10, color:C.muted, marginTop:4, textAlign:msg.from==="me"?"right":"left" }}>{msg.time}</div>
            </div>
          </div>
        ))}
        <div ref={bottomRef}/>
      </div>
      <div style={{ padding:"12px 16px 32px", background:C.white, borderTop:`1px solid ${C.rule}`, display:"flex", gap:10, alignItems:"flex-end" }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Type a message..."
          style={{ flex:1, padding:"12px 0", background:"transparent", border:"none", borderBottom:`1px solid ${C.rule}`, ...T.body, fontSize:14, color:C.ink, outline:"none" }}/>
        <button onClick={send} style={{ width:42, height:42, borderRadius:"50%", background:input.trim()?C.navy:C.rule, border:"none", color:C.white, fontSize:16, cursor:"pointer", transition:"background .2s" }}>&#8593;</button>
      </div>
    </div>
  );
}

// ── Company Swipe Card ─────────────────────────────────────────────────────────
function CompanyCard({ co, onSwipe, isTop, isPremium }) {
  const [dragX, setDragX] = useState(0);
  const [drag, setDrag] = useState(false);
  const [tab, setTab] = useState("story");
  const sx = useRef(0);
  const dn=x=>{setDrag(true);sx.current=x;};
  const mv=x=>{if(drag)setDragX(x-sx.current);};
  const up=()=>{ if(!drag)return; setDrag(false); if(dragX>50)onSwipe("right",co); else if(dragX<-50)onSwipe("left",co); else setDragX(0); };
  return (
    <div onMouseDown={e=>dn(e.clientX)} onMouseMove={e=>mv(e.clientX)} onMouseUp={up} onMouseLeave={up}
      onTouchStart={e=>dn(e.touches[0].clientX)} onTouchMove={e=>mv(e.touches[0].clientX)} onTouchEnd={up}
      style={{ position:"absolute", inset:0, transform:`translateX(${isTop?dragX:0}px) rotate(${isTop?dragX*.024:0}deg) scale(${isTop?1:.97})`, transition:drag?"none":"transform .32s cubic-bezier(.34,1.56,.64,1)", cursor:isTop?"grab":"default", userSelect:"none", zIndex:isTop?10:5 }}>

// ── Seeker Card (company browse) ──────────────────────────────────────────────
function SeekerCard({ seeker, onSwipe, isTop }) {
  const [dragX, setDragX] = useState(0);
  const [drag, setDrag] = useState(false);
  const sx = useRef(0);
  const dn=x=>{setDrag(true);sx.current=x;};
  const mv=x=>{if(drag)setDragX(x-sx.current);};
  const up=()=>{ if(!drag)return; setDrag(false); if(dragX>50)onSwipe("right",seeker); else if(dragX<-50)onSwipe("left",seeker); else setDragX(0); };
  return (
    <div onMouseDown={e=>dn(e.clientX)} onMouseMove={e=>mv(e.clientX)} onMouseUp={up} onMouseLeave={up}
      onTouchStart={e=>dn(e.touches[0].clientX)} onTouchMove={e=>mv(e.touches[0].clientX)} onTouchEnd={up}
      style={{ position:"absolute", inset:0, transform:`translateX(${isTop?dragX:0}px) rotate(${isTop?dragX*.024:0}deg) scale(${isTop?1:.97})`, transition:drag?"none":"transform .32s cubic-bezier(.34,1.56,.64,1)", cursor:isTop?"grab":"default", userSelect:"none", zIndex:isTop?10:5 }}>
      {isTop&&dragX>25&&<div style={{ position:"absolute", top:18, left:16, zIndex:20, background:C.white, border:`2px solid ${C.green}`, color:C.green, padding:"5px 16px", borderRadius:6, ...T.label, fontSize:12, opacity:Math.min(dragX/50,1) }}>Interested</div>}
      {isTop&&dragX<-25&&<div style={{ position:"absolute", top:18, right:16, zIndex:20, background:C.white, border:`2px solid ${C.ghost}`, color:C.muted, padding:"5px 16px", borderRadius:6, ...T.label, fontSize:12, opacity:Math.min(-dragX/50,1) }}>Pass</div>}
      <div style={{ position:"absolute", inset:0, background:C.white, borderRadius:10, boxShadow:"0 4px 24px rgba(0,0,0,.1)", overflow:"hidden", display:"flex", flexDirection:"column", border:`1px solid ${C.rule}` }}>

// ── AUTH: Sign In ─────────────────────────────────────────────────────────────
function SignInScreen({ onBack, onSignedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const DEMOS = {
    "lo@orion.com":      { id:"demo-lo",  email:"lo@orion.com",      firstName:"Matthew", lastName:"Muskan", accountType:"lo",      verified:true },
    "wcl@orion.com":     { id:"demo-wcl", email:"wcl@orion.com",     firstName:"West Capital", lastName:"Lending", accountType:"company", verified:true, companyId:"wcl" },
  };

  const submit = () => {
    if(!email.trim()||!password.trim()){ setError("Please enter your email and password."); return; }
    setLoading(true); setError("");
    setTimeout(()=>{
      const saved = LS.get("orion_user");
      if(saved && saved.email.toLowerCase()===email.toLowerCase()){ setLoading(false); onSignedIn(saved); return; }
      const demo = DEMOS[email.toLowerCase()];
      if(demo && password==="password123"){ LS.set("orion_user",demo); setLoading(false); onSignedIn(demo); }
      else { setLoading(false); setError("No account found. Try a demo account below."); }
    }, 1200);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.white, padding:"52px 28px 160px" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:40 }}>
        <BackBtn onClick={onBack}/><Logo size="sm"/>
      </div>
      <div style={{ ...T.label, fontSize:10, color:C.navy, marginBottom:14 }}>Welcome back</div>
      <div style={{ ...T.display, fontSize:38, color:C.ink, lineHeight:.92, marginBottom:32 }}>Sign in to<br/>Orion.</div>
      <div style={{ display:"flex", flexDirection:"column", gap:22, marginBottom:16 }}>
        <div>
          <Lbl>Email</Lbl>
          <input value={email} onChange={e=>{setEmail(e.target.value);setError("");}} placeholder="you@example.com" type="email"
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${email?C.navy:C.rule}`, ...T.body, fontSize:17, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
        </div>
        <div>
          <Lbl>Password</Lbl>
          <input value={password} onChange={e=>{setPassword(e.target.value);setError("");}} placeholder="..." type="password" onKeyDown={e=>e.key==="Enter"&&submit()}
            style={{ width:"100%", background:"transparent", border:"none", outline:"none", borderBottom:`2px solid ${password?C.navy:C.rule}`, ...T.body, fontSize:17, color:C.ink, padding:"8px 0", boxSizing:"border-box" }}/>
        </div>
      </div>
      {error&&<div style={{ ...T.body, fontSize:13, color:C.red, padding:"12px 14px", background:"#FFF0F0", borderRadius:6, marginBottom:12 }}>{error}</div>}
      <div style={{ background:C.warm, borderRadius:8, padding:"14px 16px", marginBottom:8, border:`1px solid ${C.rule}` }}>
        <div style={{ ...T.label, fontSize:9, color:C.muted, marginBottom:10 }}>Demo accounts — password: password123</div>
        {[{email:"lo@orion.com",label:"Loan Officer (Matthew Muskan)",color:C.navy},{email:"wcl@orion.com",label:"West Capital Lending",color:C.gold}].map(d=>(
          <button key={d.email} onClick={()=>{setEmail(d.email);setPassword("password123");setError("");}}
            style={{ display:"flex", gap:10, alignItems:"center", background:"none", border:"none", cursor:"pointer", padding:"5px 0", width:"100%" }}>
            <div style={{ ...T.label, fontSize:8, color:C.white, background:d.color, padding:"2px 8px", borderRadius:20, flexShrink:0 }}>{d.label}</div>
          </button>
        ))}
      </div>
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, padding:"16px 24px 32px", background:C.white, borderTop:`1px solid ${C.rule}` }}>
        {loading?<div style={{ textAlign:"center", padding:"12px 0" }}><div style={{ display:"flex", justifyContent:"center", gap:8 }}>{[0,1,2].map(i=><div key={i} style={{ width:9,height:9,borderRadius:"50%",background:C.navy,opacity:0.2+i*0.4 }}/>)}</div></div>
          :<Btn v="navy" onClick={submit} disabled={!email.trim()||!password.trim()}>Sign in</Btn>}
      </div>
    </div>
  );
}

    {label:"Remote",fn:c=>c.remote==="Remote"},{label:"Hybrid",fn:c=>c.remote==="Hybrid"},
    {label:"LOs",fn:c=>(c.hiring||[]).includes("Loan Officers")},
    {label:"Mgmt",fn:c=>(c.hiring||[]).includes("Branch Managers")},
  ];
  const filtered = COMPANIES.filter(FILTERS.find(f=>f.label===filter)?.fn||(()=>true));
  const deck = filtered.slice(cardIdx);
  const co = deck[0];

  const swipe = (dir, co) => {
    if(!co) return;
    if(dir==="right"){
      if(!paid){ setPaywallType("connect"); setShowPaywall(true); return; }
      const m = { id:co.id, name:co.name, tier:co.tier, matchedAt:Date.now(), status:"active", mid:`match-${co.id}` };
      const nm = [...matches, m]; setMatches(nm); LS.set("orion_lo_matches", nm); setShowMatch(co);
    }
    setCardIdx(i=>i+1);
  };

  const upgrade = () => { setPaid(true); LS.set("orion_paid",true); setShowPaywall(false); };
  const toggleLike = id => { const u={...likedP,[id]:!likedP[id]}; setLikedP(u); LS.set("orion_liked_posts",u); };
  const addPost = () => {
    if(!newPost.trim()) return;
    const p = { id:"p-"+Date.now(), author:`${profile.firstName} ${profile.lastName[0]}. · Irvine CA`, role:`${profile.role}, ${profile.experience} yrs`, time:"Just now", cat:"Career", text:newPost.trim(), likes:0, replies:0 };
    const u = [p,...posts]; setPosts(u); LS.set("orion_posts",u); setNewPost(""); setCompose(false);
  };
  const addReply = (pid, reply) => { const u={...replies,[pid]:[...(replies[pid]||[]),reply]}; setReplies(u); LS.set("orion_replies",u); };

  if(chatParty) return <ChatScreen matchId={chatMid||"lom"} party={chatParty} onBack={()=>setChatParty(null)} onSchedule={p=>{setChatParty(null);setSchedParty(p);setShowSched(true);}}/>;
  if(openPost) return <PostDetail post={openPost} replies={replies[openPost.id]||[]} onBack={()=>setOpenPost(null)} currentUser={profile} onAddReply={addReply}/>;

  const activeMatches = matches.filter(m=>m.status!=="disconnected");
  const TABS=[
    {id:"discover",label:"Discover"},
    {id:"matches",label:activeMatches.length?`Matches ${activeMatches.length}`:"Matches"},
    {id:"community",label:"Community"},
    {id:"learn",label:"Learn"},
    {id:"profile",label:"Profile"},
  ];

  return (
    <div style={{ paddingBottom:tab==="discover"?0:80, minHeight:"100vh", background:C.off, maxWidth:420, margin:"0 auto" }}>

      {/* DISCOVER */}
      {tab==="discover"&&(
        <div style={{ display:"flex", flexDirection:"column", height:"100vh" }}>
          <div style={{ background:C.white, padding:"52px 22px 12px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${C.rule}` }}>
            <Logo size="sm"/>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              {!paid&&<button onClick={()=>{setPaywallType("free");setShowPaywall(true);}} style={{ ...T.label, fontSize:8, color:C.navy, background:C.navyLight, border:"1px solid rgba(10,22,40,.15)", borderRadius:20, padding:"4px 10px", cursor:"pointer" }}>3 views today</button>}
              {paid&&<div style={{ ...T.label, fontSize:8, color:C.green, background:C.greenSoft, border:"1px solid rgba(10,122,74,.2)", borderRadius:20, padding:"4px 10px" }}>Full Access</div>}
            </div>
          </div>
          {/* Filter bar */}
          <div style={{ position:"relative", flexShrink:0 }}>
            <div style={{ background:C.white, borderBottom:`1px solid ${C.rule}`, padding:"10px 0 10px 16px", display:"flex", gap:8, overflowX:"auto", scrollbarWidth:"none", msOverflowStyle:"none", WebkitOverflowScrolling:"touch" }}>
              {FILTERS.map(f=>(
                <button key={f.label} onClick={()=>{setFilter(f.label);setCardIdx(0);}} style={{ padding:"7px 16px", borderRadius:20, flexShrink:0, cursor:"pointer", whiteSpace:"nowrap", border:`1px solid ${filter===f.label?C.navy:C.rule}`, background:filter===f.label?C.navy:"transparent", ...T.label, fontSize:11, color:filter===f.label?C.white:C.muted }}>
                  {f.label}
                </button>
              ))}
              <div style={{ width:32, flexShrink:0 }}/>
            </div>
            <div style={{ position:"absolute", right:0, top:0, bottom:1, width:48, background:"linear-gradient(to left, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%)", pointerEvents:"none" }}/>
          </div>
          {deck.length===0?(
            <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:40, textAlign:"center" }}>
              <div style={{ ...T.display, fontSize:28, color:C.ink, lineHeight:1, marginBottom:10 }}>You've seen<br/>everyone.</div>
              <p style={{ ...T.body, fontSize:14, color:C.muted, marginBottom:24 }}>New companies join Orion every week.</p>
              <Btn v="soft" onClick={()=>setTab("matches")} s={{ maxWidth:220 }}>See my matches {activeMatches.length}</Btn>
            </div>
          ):(
            <>
              <div style={{ flex:1, position:"relative", padding:"10px 16px 8px", minHeight:0 }}>
                {deck.length>1&&<div style={{ position:"absolute", inset:"18px 26px 0", background:C.white, borderRadius:10, border:`1px solid ${C.rule}`, transform:"scale(.97) translateY(6px)", zIndex:1 }}/>}
                {deck.slice(0,2).reverse().map((c,i)=>(
                  <CompanyCard key={c.id+"-"+i} co={c} isTop={i===Math.min(deck.length,2)-1} isPremium={c.tier==="premium"} onSwipe={swipe}/>
                ))}
              </div>
              <div style={{ background:C.white, borderTop:`1px solid ${C.rule}`, padding:"14px 0 88px", display:"flex", justifyContent:"center", alignItems:"center", gap:20, flexShrink:0 }}>
                <button onClick={()=>swipe("left",deck[0])} style={{ width:54, height:54, borderRadius:"50%", background:C.white, border:`1px solid ${C.rule}`, fontSize:22, color:C.ghost, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>&#10007;</button>
                <button onClick={()=>swipe("right",deck[0])} style={{ width:70, height:70, borderRadius:"50%", background:deck[0]?.tier==="premium"?C.gold:C.navy, border:"none", fontSize:26, color:C.white, cursor:"pointer", boxShadow:`0 6px 24px ${deck[0]?.tier==="premium"?"rgba(196,148,42,.45)":"rgba(10,22,40,.3)"}`, display:"flex", alignItems:"center", justifyContent:"center" }}>&#9825;</button>
                <button style={{ width:54, height:54, borderRadius:"50%", background:C.white, border:`1px solid ${C.rule}`, fontSize:22, color:C.ghost, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>&#9733;</button>
              </div>
            </>
          )}
          {showMatch&&<MatchModal party={showMatch} isPremium={showMatch.tier==="premium"} onChat={c=>{setShowMatch(null);setChatMid(c.mid||"m-"+c.id);setChatParty(c);}} onSchedule={c=>{setShowMatch(null);setSchedParty(c);setShowSched(true);}} onClose={()=>setShowMatch(null)}/>}
          {showPaywall&&<PaywallModal onClose={()=>setShowPaywall(false)} onUpgrade={upgrade} type={paywallType}/>}
          {showSched&&schedParty&&<ScheduleModal party={schedParty} onClose={()=>{setShowSched(false);setSchedParty(null);}} onConfirm={iv=>{const ni=[{id:"iv-"+Date.now(),...iv},...interviews];setInterviews(ni);LS.set("orion_interviews",ni);}}/>}
          <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
        </div>
      )}

      {/* MATCHES */}
      {tab==="matches"&&(
        <div style={{ minHeight:"100vh", background:C.white, paddingBottom:100 }}>
          <div style={{ padding:"52px 24px 24px", borderBottom:`1px solid ${C.rule}` }}>
            <Lbl>Matches</Lbl>
            <div style={{ ...T.display, fontSize:34, color:C.ink, lineHeight:.95, marginBottom:6 }}>{activeMatches.length>0?`${activeMatches.length} interested.`:"No matches yet."}</div>
            <div style={{ ...T.body, fontSize:14, color:C.muted }}>{activeMatches.length>0?"Your identity stays private until you choose to reveal.":"Swipe right on a company to match."}</div>
          </div>
          {interviews.length>0&&(
            <div style={{ padding:"20px 24px", borderBottom:`1px solid ${C.rule}` }}>
              <Lbl>Upcoming Calls</Lbl>
              {interviews.map(iv=>(
                <div key={iv.id} style={{ background:C.navy, borderRadius:8, padding:"18px 20px", marginBottom:8 }}>
                  <div style={{ ...T.display, fontSize:20, color:C.white, lineHeight:1, marginBottom:4 }}>{iv.slot}</div>
                  <div style={{ ...T.subhead, fontSize:14, color:"rgba(255,255,255,.55)", marginBottom:12 }}>{iv.party?.name}</div>
                  <a href="https://zoom.us" target="_blank" rel="noreferrer" style={{ display:"block", padding:"10px", background:C.green, borderRadius:6, ...T.label, fontSize:9, color:C.white, textAlign:"center" }}>Join Zoom</a>
                </div>
              ))}
            </div>
          )}
          <div style={{ padding:"0 24px" }}>
            {!paid&&activeMatches.length===0&&(
              <div style={{ padding:"32px 0", textAlign:"center" }}>
                <div style={{ width:56, height:56, borderRadius:"50%", background:C.navyLight, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px" }}>
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L15 9H22L16.5 13.5L18.5 21L12 16.5L5.5 21L7.5 13.5L2 9H9L12 2Z" fill={C.navy} opacity=".3"/></svg>
                </div>
                <div style={{ ...T.subhead, fontSize:15, color:C.ink, marginBottom:8 }}>Start swiping to find your match</div>
                <p style={{ ...T.body, fontSize:14, color:C.muted }}>Swipe right on a company to express interest. When they swipe right back — it's a match.</p>
              </div>
            )}
            {activeMatches.map(m=>(
              <div key={m.id} style={{ padding:"20px 0", borderBottom:`1px solid ${C.rule}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div>
                    <div style={{ ...T.subhead, fontSize:16, color:C.ink, marginBottom:3 }}>{m.name}</div>
                    {m.tier==="premium"&&<div style={{ ...T.label, fontSize:8, color:C.gold, background:C.goldSoft, border:`1px solid ${C.goldRule}`, padding:"2px 8px", borderRadius:20, display:"inline-block" }}>Premium Partner</div>}
                  </div>
                  <div style={{ ...T.label, fontSize:8, color:C.green, background:C.greenSoft, padding:"4px 9px", borderRadius:20, border:"1px solid rgba(10,122,74,.2)", flexShrink:0, marginLeft:12 }}>Matched</div>
                </div>
                <div style={{ display:"flex", gap:8, marginTop:12 }}>
                  <Btn v="outline" onClick={()=>{setChatMid(m.mid||`m-${m.id}`);setChatParty(COMPANIES.find(c=>c.id===m.id)||{name:m.name});}} s={{ fontSize:13, padding:"11px" }}>Chat</Btn>
                  <Btn v="navy" onClick={()=>{setSchedParty(COMPANIES.find(c=>c.id===m.id)||{name:m.name});setShowSched(true);}} s={{ fontSize:13, padding:"11px" }}>Schedule Call</Btn>
                </div>
              </div>
            ))}
          </div>
          {showSched&&schedParty&&<ScheduleModal party={schedParty} onClose={()=>{setShowSched(false);setSchedParty(null);}} onConfirm={iv=>{const ni=[{id:"iv-"+Date.now(),...iv},...interviews];setInterviews(ni);LS.set("orion_interviews",ni);}}/>}
          <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
        </div>
      )}

      {/* COMMUNITY */}
      {tab==="community"&&(
        <div style={{ minHeight:"100vh", background:C.white, paddingBottom:100 }}>
          <div style={{ padding:"52px 24px 0", borderBottom:`1px solid ${C.rule}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:20 }}>
              <div><Lbl>Community</Lbl><div style={{ ...T.display, fontSize:28, color:C.ink, lineHeight:.95 }}>The pulse<br/>of mortgage.</div></div>
              {newsTab==="feed"&&<button onClick={()=>setCompose(true)} style={{ padding:"10px 16px", background:C.navy, border:"none", borderRadius:6, ...T.label, fontSize:9, color:C.white, cursor:"pointer", flexShrink:0, marginBottom:4 }}>+ Post</button>}
            </div>
            <div style={{ display:"flex" }}>
              {[{id:"feed",label:"Community"},{id:"news",label:"Industry News"}].map(t=>(
                <button key={t.id} onClick={()=>setNewsTab(t.id)} style={{ padding:"11px 20px 13px", background:"none", border:"none", cursor:"pointer", ...T.label, fontSize:9, color:newsTab===t.id?C.ink:C.muted, borderBottom:newsTab===t.id?`2px solid ${C.navy}`:"2px solid transparent" }}>{t.label}</button>
              ))}
            </div>
          </div>
          {newsTab==="feed"&&<>
            <div style={{ padding:"12px 24px", borderBottom:`1px solid ${C.rule}`, display:"flex", gap:7, overflowX:"auto", scrollbarWidth:"none" }}>
              {["All","Win","Career","Advice"].map(c=>(
                <button key={c} onClick={()=>setCatFilter(c)} style={{ padding:"6px 14px", background:"transparent", flexShrink:0, border:`1px solid ${catFilter===c?C.navy:C.rule}`, borderRadius:20, cursor:"pointer", ...T.label, fontSize:10, color:catFilter===c?C.navy:C.muted }}>{c.toUpperCase()}</button>
              ))}
            </div>
            {(catFilter==="All"?posts:posts.filter(p=>p.cat===catFilter)).map(post=>(
              <div key={post.id} style={{ padding:"20px 24px", borderBottom:`1px solid ${C.rule}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
                  <div>
                    <div style={{ ...T.subhead, fontSize:13, color:C.ink }}>{post.author}</div>
                    <div style={{ ...T.caption, fontSize:11, color:C.muted }}>{post.role} · {post.time}</div>
                  </div>
                  <div style={{ ...T.label, fontSize:8, color:post.cat==="Win"?C.green:post.cat==="Advice"?C.blue:C.muted, background:post.cat==="Win"?C.greenSoft:post.cat==="Advice"?C.blueSoft:C.warm, padding:"3px 9px", borderRadius:20, flexShrink:0, marginLeft:8 }}>{post.cat.toUpperCase()}</div>
                </div>
                <p onClick={()=>setOpenPost(post)} style={{ ...T.body, fontSize:14, color:C.body, lineHeight:1.65, marginBottom:12, cursor:"pointer" }}>{post.text}</p>
                <div style={{ display:"flex", gap:20 }}>
                  <button onClick={()=>toggleLike(post.id)} style={{ background:"none", border:"none", display:"flex", alignItems:"center", gap:6, padding:0, cursor:"pointer" }}>
                    <span style={{ fontSize:15, color:likedP[post.id]?C.navy:C.ghost }}>{likedP[post.id]?"♥":"♡"}</span>
                    <span style={{ ...T.label, fontSize:9, color:likedP[post.id]?C.navy:C.muted }}>{post.likes+(likedP[post.id]?1:0)}</span>
                  </button>
                  <button onClick={()=>setOpenPost(post)} style={{ background:"none", border:"none", ...T.label, fontSize:9, color:C.navy, cursor:"pointer" }}>
                    {(replies[post.id]||[]).length||post.replies} replies — View
                  </button>
                </div>
              </div>
            ))}
          </>}
          {newsTab==="news"&&NEWS.map(a=>(
            <div key={a.headline} style={{ padding:"20px 24px", borderBottom:`1px solid ${C.rule}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <div style={{ ...T.label, fontSize:8, color:C.navy }}>{a.source.toUpperCase()}</div>
                <div style={{ ...T.label, fontSize:8, color:C.muted, background:C.warm, padding:"3px 9px", borderRadius:20 }}>{a.cat.toUpperCase()}</div>
              </div>
              <div style={{ ...T.heading, fontSize:15, color:C.ink, lineHeight:1.3, marginBottom:10 }}>{a.headline}</div>
              <div style={{ ...T.label, fontSize:9, color:C.navy }}>Read article</div>
            </div>
          ))}
          {compose&&(
            <div style={{ position:"fixed", inset:0, background:"rgba(10,22,40,.72)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:200 }}>
              <div style={{ background:C.white, borderRadius:"14px 14px 0 0", padding:"28px 24px 0", width:"100%", maxWidth:420, maxHeight:"85vh", overflowY:"auto", display:"flex", flexDirection:"column" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
                  <div style={{ ...T.heading, fontSize:18, color:C.ink }}>Share with the community</div>
                  <button onClick={()=>setCompose(false)} style={{ background:"none", border:"none", color:C.muted, fontSize:24, cursor:"pointer" }}>x</button>
                </div>
                <textarea value={newPost} onInput={e=>setNewPost(e.target.value)} placeholder="Share a win, ask a question, start a conversation..." rows={5}
                  style={{ width:"100%", background:"transparent", border:"none", borderBottom:`1px solid ${C.rule}`, ...T.body, fontSize:14, color:C.ink, outline:"none", resize:"none", lineHeight:1.65, boxSizing:"border-box", marginBottom:8, padding:0 }}/>
                <div style={{ ...T.caption, fontSize:11, color:newPost.length>500?C.red:C.ghost, textAlign:"right", marginBottom:16 }}>{newPost.length} / 500</div>
                <Btn v="navy" onClick={addPost} disabled={!newPost.trim()||newPost.length>500}>Post to Community</Btn>
                <div style={{ height:32 }}/>
              </div>
            </div>
          )}
          <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
        </div>
      )}

      {/* LEARN */}
      {tab==="learn"&&(
        <div style={{ minHeight:"100vh", background:C.white, paddingBottom:100 }}>
          <div style={{ background:C.navy, padding:"52px 24px 32px" }}>
            <Lbl>West Capital University</Lbl>
            <div style={{ ...T.display, fontSize:32, color:C.white, lineHeight:.95, marginBottom:12 }}>Grow your skills.<br/>Grow your career.</div>
            <p style={{ ...T.body, fontSize:14, color:"rgba(255,255,255,.5)", lineHeight:1.65 }}>Pre-licensing, continuing education, and advanced training built for working mortgage professionals.</p>
          </div>
          <div style={{ padding:"0 24px" }}>
            {/* 20-hour SAFE course */}
            <div style={{ padding:"24px 0", borderBottom:`1px solid ${C.rule}` }}>
              <div style={{ ...T.label, fontSize:9, color:C.navy, marginBottom:10 }}>Pre-Licensing</div>
              <div style={{ ...T.heading, fontSize:20, color:C.ink, marginBottom:6 }}>20-Hour SAFE Act Course</div>
              <p style={{ ...T.body, fontSize:13, color:C.body, lineHeight:1.6, marginBottom:16 }}>The federally required course to obtain your NMLS license. Self-paced, fully online. Taught by working mortgage professionals.</p>
              <div style={{ display:"flex", gap:10, marginBottom:20 }}>
                {[{n:"20",l:"Hours"},{n:"50",l:"States"},{n:"$200",l:"Investment"}].map(s=>(
                  <div key={s.l} style={{ flex:1, background:C.navyLight, borderRadius:6, padding:"12px", border:"1px solid rgba(10,22,40,.1)", textAlign:"center" }}>
                    <div style={{ ...T.display, fontSize:22, color:C.navy, lineHeight:1, marginBottom:2 }}>{s.n}</div>
                    <div style={{ ...T.label, fontSize:8, color:C.muted }}>{s.l.toUpperCase()}</div>
                  </div>
                ))}
              </div>
              <a href="https://westcapitallending.com/university" target="_blank" rel="noreferrer" style={{ display:"block", textDecoration:"none" }}><Btn v="navy">Get started — $200</Btn></a>
              <p style={{ ...T.caption, fontSize:11, color:C.muted, textAlign:"center", marginTop:8, lineHeight:1.5 }}>One-time fee covers the full 20-hour course and exam prep.</p>
            </div>
            {[
              {tag:"CE",title:"Continuing Education",desc:"8 hours annually to maintain your NMLS license in good standing."},
              {tag:"Training",title:"Product Training",desc:"Conventional, FHA, VA, Jumbo, Non-QM — full product suite training."},
              {tag:"Sales",title:"Sales and Client Coaching",desc:"Referral-building, objection handling, and relationship management."},
              {tag:"Advanced",title:"Branch Manager Prep",desc:"Leadership, compliance, team recruiting — for LOs ready to lead."},
            ].map((c,i)=>(
              <div key={i} style={{ padding:"16px 0", borderBottom:`1px solid ${C.rule}`, display:"flex", justifyContent:"space-between", gap:12 }}>
                <div style={{ flex:1 }}>
                  <div style={{ ...T.subhead, fontSize:14, color:C.ink, marginBottom:3 }}>{c.title}</div>
                  <div style={{ ...T.body, fontSize:13, color:C.muted }}>{c.desc}</div>
                </div>
                <div style={{ ...T.label, fontSize:8, color:C.muted, background:C.warm, padding:"4px 9px", borderRadius:20, border:`1px solid ${C.rule}`, flexShrink:0, alignSelf:"flex-start", marginTop:4 }}>{c.tag.toUpperCase()}</div>
              </div>
            ))}
          </div>
          <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
        </div>
      )}

      {/* PROFILE — Matthew Muskan */}
      {tab==="profile"&&(
        <div style={{ minHeight:"100vh", background:C.white, paddingBottom:100 }}>
          {/* Header with photo */}
          <div style={{ background:C.navy, padding:"52px 24px 28px" }}>
            <div style={{ display:"flex", gap:18, alignItems:"flex-end", marginBottom:16 }}>
              <div style={{ width:80, height:80, borderRadius:12, overflow:"hidden", flexShrink:0, border:"3px solid rgba(255,255,255,.2)" }}>
                <img src={MATTHEW_PHOTO} alt="Matthew Muskan" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ ...T.display, fontSize:22, color:C.white, lineHeight:.95, marginBottom:4 }}>{profile.firstName} {profile.lastName}</div>
                <div style={{ ...T.caption, fontSize:12, color:"rgba(255,255,255,.5)", marginBottom:4 }}>{profile.title} · {profile.company}</div>
                <div style={{ ...T.label, fontSize:9, color:C.gold }}>NMLS #{profile.nmls} — Verified</div>
              </div>
            </div>
            <div style={{ background:"rgba(255,255,255,.06)", borderRadius:6, padding:"12px 14px", border:"1px solid rgba(255,255,255,.08)" }}>
              <p style={{ ...T.body, fontSize:13, color:"rgba(255,255,255,.65)", lineHeight:1.55 }}>{profile.bio}</p>
            </div>
          </div>
          {/* Stats */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:1, background:C.rule }}>
            {[{l:"Volume",v:profile.volume},{l:"Units",v:`${profile.units}`},{l:"Avg Loan",v:profile.avgLoan}].map(s=>(
              <div key={s.l} style={{ padding:"16px 20px", background:C.white }}>
                <div style={{ ...T.display, fontSize:22, color:C.navy, lineHeight:1, marginBottom:3 }}>{s.v}</div>
                <div style={{ ...T.label, fontSize:8, color:C.muted }}>{s.l.toUpperCase()}</div>
              </div>
            ))}
          </div>
          <div style={{ padding:"0 24px" }}>
            {/* States */}
            <div style={{ padding:"18px 0", borderBottom:`1px solid ${C.rule}` }}>
              <Lbl>Licensed in {profile.states.length} states</Lbl>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                {profile.states.map(s=><div key={s} style={{ background:C.navyLight, border:"1px solid rgba(10,22,40,.1)", borderRadius:4, padding:"3px 8px", ...T.label, fontSize:8, color:C.navy }}>{s}</div>)}
              </div>
            </div>
            {/* Loan types */}
            <div style={{ padding:"18px 0", borderBottom:`1px solid ${C.rule}` }}>
              <Lbl>Loan types</Lbl>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>

          <BottomNav tabs={TABS} active={tab} onTab={setTab}/>

    </div>

}

              </div>
            </div>
            {/* Hiring */}
            <div style={{ padding:"18px 0", borderBottom:`1px solid ${C.rule}` }}>
              <Lbl>Currently Hiring</Lbl>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {WCL.hiring.map(r=><div key={r} style={{ background:C.navyLight, border:"1px solid rgba(10,22,40,.12)", borderRadius:6, padding:"8px 14px", ...T.label, fontSize:9, color:C.navy }}>{r}</div>)}
              </div>
            </div>
            {/* Social */}
            <div style={{ padding:"18px 0", borderBottom:`1px solid ${C.rule}` }}>
              <Lbl>Connect</Lbl>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                <a href={WCL.website} target="_blank" rel="noreferrer" style={{ ...T.label, fontSize:9, color:C.navy, background:C.navyLight, border:"1px solid rgba(10,22,40,.15)", padding:"8px 14px", borderRadius:6 }}>Website</a>
                <a href={WCL.linkedin} target="_blank" rel="noreferrer" style={{ ...T.label, fontSize:9, color:C.blue, background:C.blueSoft, border:"1px solid rgba(26,106,200,.2)", padding:"8px 14px", borderRadius:6 }}>LinkedIn</a>
                <a href={WCL.instagram} target="_blank" rel="noreferrer" style={{ ...T.label, fontSize:9, color:C.body, background:C.warm, border:`1px solid ${C.rule}`, padding:"8px 14px", borderRadius:6 }}>Instagram</a>
              </div>
            </div>
            <div style={{ paddingTop:24, paddingBottom:40 }}>
              <button onClick={onSignOut} style={{ background:"none", border:`1px solid ${C.rule}`, borderRadius:6, padding:"12px", width:"100%", cursor:"pointer", ...T.label, fontSize:10, color:C.muted }}>Sign out</button>
            </div>
          </div>
          <BottomNav tabs={TABS} active={tab} onTab={setTab}/>
        </div>
      )}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(()=>{
    const u = LS.get("orion_user");
    return u ? "app" : "home";
  });
  const [user, setUser] = useState(()=>LS.get("orion_user"));

  const signOut = () => { LS.del("orion_user"); setUser(null); setScreen("home"); };
  const afterSignIn = u => { setUser(u); setScreen("app"); };

  if(screen==="app"&&user){
    if(user.accountType==="company") return <CompanyApp user={user} onSignOut={signOut}/>;
    return <LOApp user={user} onSignOut={signOut}/>;
  }

  return (
    <div style={{ maxWidth:420, margin:"0 auto", minHeight:"100vh", background:C.white }}>
      {screen==="home"&&<HomeScreen onLO={()=>{ const u={id:"demo-lo",email:"lo@orion.com",firstName:"Matthew",lastName:"Muskan",accountType:"lo",role:"Branch Manager",verified:true}; LS.set("orion_user",u); setUser(u); setScreen("app"); }} onCompany={()=>{ const u={id:"demo-wcl",email:"wcl@orion.com",firstName:"West Capital",lastName:"Lending",accountType:"company",verified:true}; LS.set("orion_user",u); setUser(u); setScreen("app"); }} onSignIn={()=>setScreen("signin")}/>}
      {screen==="signin"&&<SignInScreen onBack={()=>setScreen("home")} onSignedIn={afterSignIn}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
